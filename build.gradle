plugins {
    id 'net.fabricmc.fabric-loom' version '1.17-SNAPSHOT'
    id 'com.gradleup.shadow' version '9.4.3'
}

version = mod_version
group = maven_group

base {
    archivesName = 'crest-client'
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.fabricmc.net/' }
    maven { url = 'https://jitpack.io' }
}

configurations {
    shadow
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"

    implementation "net.fabricmc:fabric-loader:${loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${fabric_api_version}"

    shadow 'dev.arbjerg:lavaplayer:2.2.6'
    implementation 'dev.arbjerg:lavaplayer:2.2.6'

    // ponytail: Sodium is the block mesher in our environment; the Block LOD mixin
    // targets Sodium internals, so it must be on the compile classpath. compileOnly
    // on the local mod jar includes it for compilation but does NOT bundle/shade it.
    compileOnly files("run/mods/sodium-fabric-0.9.1+mc26.1.2.jar")

    compileOnly "io.github.llamalad7:mixinextras-fabric:0.5.4"
    implementation "io.github.llamalad7:mixinextras-fabric:0.5.4"
}

shadowJar {
    archiveClassifier.set('')
    configurations = [project.configurations.shadow]
    dependencies {
        exclude(dependency('org.slf4j:slf4j-api'))
    }
}

jar {
    archiveClassifier.set('slim')
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 26
}

java {
    withSourcesJar()
}

processResources {
    inputs.property 'version', version
    filesMatching('fabric.mod.json') { expand 'version': version }
}

tasks.named("runClient", JavaExec).configure {
    if (project.hasProperty("mc_username")) {
        args "--username", project.getProperty("mc_username")
    }
}
